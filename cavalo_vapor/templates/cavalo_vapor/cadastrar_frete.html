{% extends "cavalo_vapor/base_layout.html" %}
{% block style %}
{% load static %}
<link rel="stylesheet" type="text/css" href="{% static 'cavalo_vapor/css/cadastrar_frete.css' %}" />
{% endblock %}
{% block script %}{% endblock %}
{% block title %}
Cavalo-Vapor
Fretes | Cadastro
{% endblock %}
{% block conteudo %}

<div class="conteudo">
	<span>
		<h1>Cadastrar Frete:</h1>
	</span>
	<br>
	<div class="formulario">
		<form method="POST" action="">
			{% csrf_token %}
			{{form}}
			<div>
				<button type="submit" value="salvar">Cadastrar</button>
			</div>
		</form>
	</div>
</div>

{% endblock %}
